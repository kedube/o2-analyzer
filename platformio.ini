[platformio]
default_envs = nano

[env]
framework = arduino
monitor_speed = 9600
upload_speed = 115200
build_flags =
  -D SSD1306_NO_SPLASH
lib_deps =
  adafruit/Adafruit GFX Library @ ^1.12.6
  adafruit/Adafruit SSD1306 @ ^2.5.16
  adafruit/Adafruit ADS1X15 @ ^2.6.2

[env:nano]
platform = atmelavr
board = nanoatmega328new

